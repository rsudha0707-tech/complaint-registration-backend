<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in - Google Accounts</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #FFFFFF;
      color: #202124;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      width: 380px;
      padding: 40px 40px 36px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      text-align: center;
    }
    .google-logo {
      width: 75px;
      height: auto;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      font-weight: 400;
      margin: 0 0 8px;
      color: #202124;
    }
    p {
      font-size: 16px;
      color: #5f6368;
      margin: 0 0 30px;
    }
    .account-list {
      text-align: left;
      border-top: 1px solid #dadce0;
      margin-bottom: 20px;
    }
    .account-item {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #dadce0;
      cursor: pointer;
      transition: background 0.2s;
    }
    .account-item:hover {
      background: #f8f9fa;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #1a73e8;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 16px;
      margin-right: 12px;
    }
    .info {
      display: flex;
      flex-direction: column;
    }
    .name {
      font-size: 14px;
      font-weight: 500;
      color: #3c4043;
    }
    .email {
      font-size: 12px;
      color: #5f6368;
    }
    .footer {
      font-size: 12px;
      color: #5f6368;
      margin-top: 24px;
      display: flex;
      justify-content: space-between;
    }
    .footer a {
      color: #1a73e8;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="card">
    <svg class="google-logo" viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
    </svg>
    <h1>Choose an account</h1>
    <p>to continue to IOVS Portal</p>

    <div class="account-list">
      <div class="account-item" onclick="selectAccount('sudha.uppolice@gmail.com', 'Sudha Singh')">
        <div class="avatar">S</div>
        <div class="info">
          <span class="name">Sudha Singh</span>
          <span class="email">sudha.uppolice@gmail.com</span>
        </div>
      </div>
      <div class="account-item" onclick="selectAccount('rsudha0707@gmail.com', 'Rsudha')">
        <div class="avatar" style="background: #34A853;">R</div>
        <div class="info">
          <span class="name">Rsudha Tech</span>
          <span class="email">rsudha0707@gmail.com</span>
        </div>
      </div>
      <div class="account-item" onclick="selectAccount('citizen.test@gmail.com', 'Citizen Test')">
        <div class="avatar" style="background: #FBBC05;">C</div>
        <div class="info">
          <span class="name">Citizen Test</span>
          <span class="email">citizen.test@gmail.com</span>
        </div>
      </div>
    </div>

    <div class="footer">
      <span>English (United States)</span>
      <div>
        <a href="#">Help</a>
        <a href="#" style="margin-left: 10px;">Privacy</a>
        <a href="#" style="margin-left: 10px;">Terms</a>
      </div>
    </div>
  </div>

  <script>
    function selectAccount(email, name) {
      if (window.opener && !window.opener.closed) {
        window.opener.onGoogleLoginSuccess(email);
      }
      window.close();
    }
  </script>
</body>
</html>
